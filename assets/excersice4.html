<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    .container {
        width: 500px;
        padding: 10px;
        margin: auto;
        background-color: bisque;
    }

    .header,
    .nav,
    .footer,
    .section {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background-color: green;
        color: white;
    }

    .scale {
        padding: 30px 10px;
    }

    .article {
        display: flex;
        justify-content: space-between;
        color: white;
        margin-bottom: 10px;
    }

    .left-side {
        width: 60%;
        background-color: green;
    }

    .right-side {
        width: 35%;
        background-color: green;
    }

    .article-header {
        background-color: gainsboro;
        margin: 10px;
        color: black;
        padding: 5px;
    }

    .main {
        background-color: gainsboro;
        margin: 10px;
        color: black;
        padding: 50px 5px;
    }

    .right-side {
        background-color: green;
        color: white;
        display: flex;
        padding-left: 5px;
        align-items: center;
    }
</style>

<body>
    <div class="container">

        <div class="header">Page Header</div>
        <div class="nav">Nav</div>
        <div class="article">
            <div class="left-side">Article
                <div class="article-header">Article Header</div>
                <div class="main">Main</div>
            </div>
            <div class="right-side">Aside</div>
        </div>
        <div class="section scale">Section</div>
        <div class="footer">Footer</div>

    </div>
</body>

</html>
